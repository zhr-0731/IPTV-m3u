name: Daily Dashboard Screenshot

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 19:00 = 北京时间次日 03:00
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run screenshot script
        run: node scripts/screenshot.js
        continue-on-error: true

      - name: Commit and push screenshot
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/dashboard.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update dashboard screenshot [skip ci]"
            git push
          fi