name: Daily Random Music

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉取全部历史，以便 rebase 时能正确处理

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script to fetch music
        run: python scripts/get_music.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily-music.m3u music-history.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Update daily music and history"
          git pull --rebase origin main
          git push
