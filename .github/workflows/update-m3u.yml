name: Daily Update IPTV M3U and EPG

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = 北京时间次日 02:00
  workflow_dispatch:

jobs:
  update-m3u-and-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tqdm

      - name: Run update for iptv4.m3u (classified)
        run: python scripts/update_iptv.py

      - name: Run update for iptv-org (international)
        run: python scripts/update_iptv_org.py

      - name: Generate report, update README, JSON and send Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python scripts/generate_report.py

      - name: Download EPG XML file
        run: |
          mkdir -p epg
          curl -L --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -o epg/epg.xml https://epg.zsdc.eu.org/t.xml

      # ---------- 截图相关步骤 ----------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright/
          key: ${{ runner.os }}-playwright

      - name: Install shot-scraper and browser
        run: |
          pip install shot-scraper
          shot-scraper install

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Take screenshot of Feishu dashboard
        run: |
          mkdir -p img
          shot-scraper shot https://my.feishu.cn/share/base/dashboard/shrcnuIzAL4nel5s1CFA8YYs56e \
            -o img/dashboard.png \
            --width 1400 \
            --height 900 \
            --wait 5000
        continue-on-error: true

      - name: Append screenshot to README.md
        if: success()
        run: |
          echo "" >> README.md
          echo "## 📸 仪表盘截图" >> README.md
          echo "" >> README.md
          echo "![IPTV 仪表盘](img/dashboard.png)" >> README.md
          echo "" >> README.md
          echo "*截图更新时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')*" >> README.md

      # ---------- 提交所有变更 ----------
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u index_dead.m3u iptv-org.m3u iptv-org_dead.m3u README.md report.json epg/epg.xml logs/ img/dashboard.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update playlists, report, EPG, logs and screenshot [skip ci]"
            git push
          fi