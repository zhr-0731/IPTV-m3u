name: Daily Update IPTV M3U

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tqdm

      - name: Run update for iptv4.m3u (classified)
        run: python scripts/update_iptv.py

      - name: Run update for iptv-org (all channels)
        run: python scripts/update_iptv_org.py

      - name: Generate report and update README
        run: python scripts/generate_report.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u index_dead.m3u iptv-org.m3u iptv-org_dead.m3u README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update playlists and report [skip ci]"
            git push
          fi